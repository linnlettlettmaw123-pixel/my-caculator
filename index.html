<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Toy Story Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Floating characters -->
<img class="char woody" src="https://i.imgur.com/4M7IWwP.png">
<img class="char buzz" src="https://i.imgur.com/8Qf5Y1q.png">
<img class="char jessie" src="https://i.imgur.com/3ZQ3ZQm.png">

<div class="calculator bounce">
  <h2>🤠 Toy Story Calculator 🚀</h2>

  <input type="text" id="display" disabled>

  <div class="buttons">
    <button onclick="clearDisplay()" class="op">C</button>
    <button onclick="appendValue('/')">÷</button>
    <button onclick="appendValue('*')">×</button>
    <button onclick="deleteLast()">⌫</button>

    <button onclick="appendValue('7')">7</button>
    <button onclick="appendValue('8')">8</button>
    <button onclick="appendValue('9')">9</button>
    <button onclick="appendValue('-')" class="op">-</button>

    <button onclick="appendValue('4')">4</button>
    <button onclick="appendValue('5')">5</button>
    <button onclick="appendValue('6')">6</button>
    <button onclick="appendValue('+')" class="op">+</button>

    <button onclick="appendValue('1')">1</button>
    <button onclick="appendValue('2')">2</button>
    <button onclick="appendValue('3')">3</button>
    <button onclick="calculate()" class="equal">=</button>

    <button onclick="appendValue('0')" class="zero">0</button>
    <button onclick="appendValue('.')">.</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
